# ── Terminal ────────────────────────────────────────────────────────────────────
set -g default-terminal 'tmux-256color'
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

# ── General ──────────────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g status-interval 2
set -sg escape-time 10
set -g focus-events on

# ── Keybindings ───────────────────────────────────────────────────────────────
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "  Config reloaded"
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z
bind C-p previous-window
bind C-n next-window

# ── VIM motions ───────────────────────────────────────────────────────────────
set -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style          "fg=#313244"
set -g pane-active-border-style   "fg=#89b4fa"
set -g pane-border-lines          heavy

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-position top
set -g status-style          "bg=#1e1e2e"
set -g status-left-length    60
set -g status-right-length   100

#   Left — session pill  (rounded caps: \ue0b6 \ue0b4)
set -g status-left \
  "#[fg=#89b4fa,bg=#1e1e2e]\
#[bg=#89b4fa,fg=#1e1e2e,bold]  #S \
#[fg=#89b4fa,bg=#1e1e2e,nobold]  "

#   Right — directory pill + time pill
set -g status-right \
  " #[fg=#45475a,bg=#1e1e2e]\
#[bg=#45475a,fg=#cdd6f4]  #{b:pane_current_path} \
#[fg=#45475a,bg=#1e1e2e] \
#[fg=#313244,bg=#1e1e2e]\
#[bg=#313244,fg=#89b4fa,bold]  %H:%M \
#[fg=#313244,bg=#1e1e2e]"

# ── Window tabs ───────────────────────────────────────────────────────────────
set -g window-status-separator "  "

set -g window-status-format \
  "#[fg=#45475a,bg=#1e1e2e] #I  #{b:pane_current_path} "

set -g window-status-current-format \
  "#[fg=#313244,bg=#1e1e2e]\
#[bg=#313244,fg=#cdd6f4,bold] #I  #{b:pane_current_path} \
#[fg=#313244,bg=#1e1e2e]"

# ── UI chrome ─────────────────────────────────────────────────────────────────
set -g message-style         "bg=#89b4fa,fg=#1e1e2e,bold"
set -g message-command-style "bg=#313244,fg=#cdd6f4"
set -g mode-style            "bg=#89b4fa,fg=#1e1e2e"

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

run '~/.config/tmux/plugins/tpm/tpm'
